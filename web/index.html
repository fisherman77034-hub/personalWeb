<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字分身 Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#05050a;
  --card:rgba(255,255,255,0.04);
  --card-border:rgba(255,255,255,0.08);
  --card-hover:rgba(255,255,255,0.06);
  --accent:#7c5cfc;
  --accent2:#5b8def;
  --accent-glow:rgba(124,92,252,0.25);
  --text:#e4e4e7;
  --text-secondary:#a1a1aa;
  --text-muted:#52525b;
  --radius:16px;
  --radius-sm:10px;
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
}
.bg-glow{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bg-glow::before,.bg-glow::after{content:"";position:absolute;border-radius:50%;filter:blur(120px)}
.bg-glow::before{width:600px;height:600px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);top:-15%;left:10%;opacity:.45}
.bg-glow::after{width:500px;height:500px;background:radial-gradient(circle,rgba(91,141,239,0.15) 0%,transparent 70%);bottom:-10%;right:5%;opacity:.4}
.nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto;padding:16px 32px}
.nav-brand{display:flex;align-items:center;gap:12px}
.nav-logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.nav-title{font-size:17px;font-weight:600;color:var(--text)}
.nav-subtitle{font-size:12px;color:var(--text-muted);margin-top:1px}
.nav-status{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);font-size:12px;color:#22c55e}
.nav-status::before{content:"";width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.scroll-container{height:100dvh;overflow-y:scroll;}
.page{height:100dvh;scroll-snap-align:start;display:flex;flex-direction:column;position:relative;overflow:hidden}
.page-1{justify-content:center;align-items:center}
.page-2{justify-content:flex-start;align-items:center;padding-top:80px;overflow-y:auto}
.video-bg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden}
.video-bg video{width:100%;height:100%;object-fit:cover;display:block}
.video-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(5,5,10,0.2) 0%,rgba(5,5,10,0.5) 50%,rgba(5,5,10,0.8) 100%);z-index:1}
.page-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;width:100%;padding:80px 32px 40px}
.hero{text-align:center;max-width:640px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;background:var(--card);border:1px solid var(--card-border);color:var(--text-secondary);margin-bottom:24px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.hero-badge span{color:var(--accent)}
.hero h1{font-size:clamp(32px,5vw,52px);font-weight:700;line-height:1.15;letter-spacing:-0.03em;background:linear-gradient(135deg,#fff 0%,#a1a1aa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
.hero p{font-size:16px;color:var(--text-secondary);max-width:520px;margin:0 auto;line-height:1.7}
.scroll-hint{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-muted);font-size:12px;animation:bounce 2s infinite;z-index:2}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
.scroll-hint svg{width:20px;height:20px;opacity:.5}
.nav-dots{position:fixed;right:24px;top:50%;transform:translateY(-50%);z-index:200;display:flex;flex-direction:column;gap:12px}
.nav-dot{width:10px;height:10px;border-radius:50%;background:var(--card-border);border:1px solid rgba(255,255,255,0.1);cursor:pointer;transition:all .25s ease}
.nav-dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px var(--accent-glow)}
.content-area{width:100%;max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:20px;padding-bottom:40px}
.chat-panel{border-radius:var(--radius);background:var(--card);border:1px solid var(--card-border);overflow:hidden}
.chat-panel-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--card-border)}
.chat-panel-header h2{font-size:15px;font-weight:600;color:var(--text)}
.chat-panel-actions{display:flex;gap:8px}
.btn-sm{padding:6px 14px;border-radius:8px;font-size:12px;border:1px solid var(--card-border);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.btn-sm:hover{background:var(--card-hover);color:var(--text)}
.btn-sm.danger{border-color:rgba(239,68,68,0.3);color:#ef4444}
.btn-sm.danger:hover{background:rgba(239,68,68,0.1)}
.chat-messages{padding:20px 24px;min-height:320px;max-height:480px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.chat-messages::-webkit-scrollbar{width:5px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:3px}
.msg{max-width:80%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.7;word-break:break-word;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--accent),#6344e0);color:#fff;border:none}
.msg.agent{align-self:flex-start;background:rgba(255,255,255,0.05);border:1px solid var(--card-border);color:var(--text)}
.msg.loading-msg{align-self:flex-start;background:transparent;border:1px dashed var(--card-border);color:var(--text-muted);font-style:italic}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;gap:8px;padding:40px}
.empty-state svg{opacity:.3}
.chat-input-area{padding:16px 20px;border-top:1px solid var(--card-border);display:flex;gap:10px;align-items:flex-end}
.chat-input-area textarea{flex:1;padding:12px 16px;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:rgba(255,255,255,0.03);color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none;min-height:44px;max-height:120px;line-height:1.5;transition:border-color .15s}
.chat-input-area textarea:focus{border-color:var(--accent)}
.chat-input-area textarea::placeholder{color:var(--text-muted)}
.send-btn{width:44px;height:44px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.send-btn:hover{background:#6344e0;box-shadow:0 0 20px var(--accent-glow)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.send-btn svg{width:18px;height:18px}
.job-panel{border-radius:var(--radius);background:var(--card);border:1px solid var(--card-border);padding:24px}
.job-panel h2{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text)}
.job-panel .job-btn{padding:10px 28px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.job-panel .job-btn:hover{box-shadow:0 0 24px var(--accent-glow);transform:translateY(-1px)}
.job-panel .job-btn:active{transform:scale(.97)}
.job-result{margin-top:16px;padding:16px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.02);border:1px solid var(--card-border);font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;display:none}
@media(max-width:768px){
  .nav{padding:12px 16px}
  .page-1,.page-2{padding:70px 16px 32px}
  .nav-dots{right:12px}
  .content-area{padding-bottom:24px}
  .chat-messages{min-height:240px}
  .msg{max-width:90%}
  .page-inner{padding:70px 16px 32px}
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<nav class="nav">
  <div class="nav-brand">
    <div class="nav-logo">AI</div>
    <div><div class="nav-title">数字分身 Agent</div><div class="nav-subtitle">HR 面试智能助手</div></div>
  </div>
  <div class="nav-status">在线</div>
</nav>
<div class="nav-dots">
  <div class="nav-dot active" onclick="scrollToPage(0)"></div>
  <div class="nav-dot" onclick="scrollToPage(1)"></div>
</div>
<div class="scroll-container" id="scrollContainer">
  <!-- 第一页：视频背景 + 英雄区 -->
  <section class="page page-1">
    <div class="video-bg">
      <video id="heroVideo" preload="auto" muted></video>
    </div>
    <div class="video-overlay"></div>
    <div class="page-inner">
      <div class="hero">
        <div class="hero-badge">&#9889; <span>基于你的简历与经历</span> 自动生成专业回答</div>
        <h1>你的数字分身<br>随时应对面试</h1>
        <p>上传你的简历，HR 通过网页提问时，Agent 以你的口吻和专业水平自动作答。</p>
      </div>
      <div class="scroll-hint">
        <span>鼠标左右移动控制视频进度 · 向下滚动开始使用</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
      </div>
    </div>
  </section>
  <!-- 第二页：问答页面 -->
  <section class="page page-2">
    <div class="content-area">
      <div class="chat-panel">
        <div class="chat-panel-header">
          <h2>&#128172; 面试问答</h2>
          <div class="chat-panel-actions">
            <button class="btn-sm danger" onclick="clearChat()">清空对话</button>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>输入 HR 的面试问题开始对话</span>
          </div>
        </div>
        <div class="chat-input-area">
          <textarea id="questionInput" placeholder="请输入面试问题..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
      <div class="job-panel">
        <h2>&#127919; 岗位推荐</h2>
        <button class="job-btn" onclick="getJobRecommend()">获取推荐岗位</button>
        <div class="job-result" id="jobResult"></div>
      </div>
    </div>
  </section>
</div>
<script>
// === 全屏滚动 ===
var scrollContainer = document.getElementById("scrollContainer");
var navDots = document.querySelectorAll(".nav-dot");

function easeOutExpo(t) {
  return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
}

var isScrolling = false;
function scrollToPage(index) {
  if (isScrolling) return;
  var current = scrollContainer.scrollTop;
  var target = scrollContainer.clientHeight * index;
  var distance = target - current;
  var duration = Math.max(400, Math.min(1000, Math.abs(distance) * 2));
  var startTime = null;
  isScrolling = true;

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    var elapsed = timestamp - startTime;
    var progress = Math.min(elapsed / duration, 1);
    var eased = easeOutExpo(progress);
    scrollContainer.scrollTop = current + distance * eased;
    if (progress < 1) {
      requestAnimationFrame(step);
    } else {
      scrollContainer.scrollTop = target;
      isScrolling = false;
    }
  }
  requestAnimationFrame(step);
}

function updateDots() {
  var idx = Math.round(scrollContainer.scrollTop / scrollContainer.clientHeight);
  navDots.forEach(function(d, i) {
    d.classList.toggle("active", i === idx);
  });
}
scrollContainer.addEventListener("scroll", updateDots, { passive: true });

// === 滚轮拦截：一次滚轮翻一页 ===
var wheelAccum = 0;
scrollContainer.addEventListener('wheel', function(e) {
  if (scrollContainer.clientHeight * 2 <= scrollContainer.scrollHeight) {
    wheelAccum += e.deltaY;
    if (Math.abs(wheelAccum) > 50) {
      var curIdx = Math.round(scrollContainer.scrollTop / scrollContainer.clientHeight);
      var dir = wheelAccum > 0 ? 1 : -1;
      var next = Math.max(0, Math.min(1, curIdx + dir));
      if (next !== curIdx) scrollToPage(next);
      wheelAccum = 0;
      e.preventDefault();
    }
    clearTimeout(scrollContainer._wt);
    scrollContainer._wt = setTimeout(function() { wheelAccum = 0; }, 150);
  }
}, { passive: false });


// === 视频鼠标跟随进度 ===
var heroVideo = document.getElementById("heroVideo");
var videoDuration = 0;
var targetTime = 0;
var pendingSeek = false;

// 设置视频源
heroVideo.src = "/static/girl.mp4?v=" + Date.now();
heroVideo.load();

function onVideoReady() {
  if (videoDuration > 0 && heroVideo.currentTime !== 0) {
    heroVideo.currentTime = 0;
  }
  targetTime = 0;
  videoDuration = heroVideo.duration;
}

heroVideo.addEventListener("loadeddata", onVideoReady);
heroVideo.addEventListener("loadedmetadata", onVideoReady);

// 鼠标移动控制视频进度
document.addEventListener("mousemove", function(e) {
  if (!isFinite(videoDuration) || videoDuration <= 0) return;
  // 鼠标在最左边 → 视频开头，最右边 → 视频结尾
  var ratio = 1 - e.clientX / window.innerWidth;
  targetTime = ratio * videoDuration;
  if (targetTime < 0) targetTime = 0;
  if (targetTime > videoDuration) targetTime = videoDuration;
  if (!pendingSeek) {
    pendingSeek = true;
    heroVideo.currentTime = targetTime;
  }
});

heroVideo.addEventListener("seeked", function() {
  pendingSeek = false;
  var diff = Math.abs(heroVideo.currentTime - targetTime);
  if (diff > 0.05) {
    pendingSeek = true;
    heroVideo.currentTime = targetTime;
  }
});

// === 聊天功能 ===
var chatMessages = document.getElementById("chatMessages");
var questionInput = document.getElementById("questionInput");
var sendBtn = document.getElementById("sendBtn");
var jobResult = document.getElementById("jobResult");

questionInput.addEventListener("input", function() {
  questionInput.style.height = "auto";
  questionInput.style.height = Math.min(questionInput.scrollHeight, 120) + "px";
  sendBtn.disabled = !questionInput.value.trim();
});

questionInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function sendMessage() {
  var q = questionInput.value.trim();
  if (!q) return;
  appendMsg(q, "user");
  questionInput.value = "";
  questionInput.style.height = "auto";
  sendBtn.disabled = true;
  var lid = appendMsg("正在思考...", "loading");
  try {
    var fd = new FormData();
    fd.append("question", q);
    var res = await fetch("/api/chat", { method: "POST", body: fd });
    var data = await res.json();
    document.getElementById(lid)?.remove();
    appendMsg(data.answer, "agent");
  } catch (err) {
    document.getElementById(lid)?.remove();
    appendMsg("请求失败: " + err.message, "agent");
  }
  sendBtn.disabled = !questionInput.value.trim();
}

function appendMsg(text, type) {
  var id = "msg_" + Date.now();
  var div = document.createElement("div");
  div.id = id;
  div.className = "msg " + type;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return id;
}

function clearChat() {
  chatMessages.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>输入 HR 的面试问题开始对话</span></div>';
}

async function getJobRecommend() {
  try {
    var res = await fetch("/api/recommend");
    var data = await res.json();
    jobResult.textContent = data.jobs;
    jobResult.style.display = "block";
  } catch (err) {
    alert("获取推荐失败: " + err.message);
  }
}
</script>
</body>
</html>
