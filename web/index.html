<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数字分身 Agent</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <!-- 背景光晕 -->
    <div class="bg-glow"></div>

    <!-- 顶部导航 -->
    <nav class="nav">
      <div class="nav-brand">
        <div class="nav-logo">AI</div>
        <div>
          <div class="nav-title">数字分身 Agent</div>
          <div class="nav-subtitle">HR 面试智能助手</div>
        </div>
      </div>
      <div class="nav-status">在线</div>
    </nav>

    <!-- 右侧导航圆点 -->
    <div class="nav-dots">
      <div class="nav-dot active" onclick="scrollToPage(0)"></div>
      <div class="nav-dot" onclick="scrollToPage(1)"></div>
    </div>

    <!-- 全屏滚动容器 -->
    <div class="scroll-container" id="scrollContainer">
      <!-- ===== 第一页：视频背景 + 英雄区 ===== -->
      <section class="page page-1">
        <div class="video-bg">
          <video id="heroVideo" preload="auto" muted></video>
        </div>
        <div class="video-overlay"></div>
        <div class="page-inner">
          <div class="hero">
            <div class="hero-badge">
              &#9889; <span>基于你的简历与经历</span> 生成专业回答
            </div>
            <h1>你的数字分身<br />随时应对面试</h1>
            <p>
              根据后台简历，HR 通过网页提问时，Agent 根据专业水平自动作答。
            </p>
          </div>
          <div class="scroll-hint">
            <span> 向下滚动开始使用</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M7 13l5 5 5-5M7 6l5 5 5-5" />
            </svg>
          </div>
        </div>
      </section>

      <!-- ===== 第二页：面试问答 ===== -->
      <section class="page page-2">
        <div class="content-area">
          <div class="chat-panel">
            <div class="chat-panel-header">
              <h2>&#128172; 面试问答</h2>
              <div class="chat-panel-actions">
                <button class="btn-sm danger" onclick="clearChat()">清空对话</button>
              </div>
            </div>

            <div class="chat-messages" id="chatMessages">
              <div class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                <span>输入 HR 的面试问题开始对话</span>
              </div>
            </div>

            <div class="chat-input-area">
              <textarea
                id="questionInput"
                placeholder="请输入面试问题..."
                rows="1"
              ></textarea>
              <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="22" y1="2" x2="11" y2="13" />
                  <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script src="/static/js/app.js"></script>
  </body>
</html>
